<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novum Finanzas | Gestión Inteligente</title>
    <meta name="google-site-verification" content="D2gWA7eWmm_4Ldm61fRj7XhMxhnBoAfo_BamcEQaGz4" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6750A4;
            --primary-container: #EADDFF;
            --surface: #FDFBFF;
            --text-main: #1C1B1F;
            --text-secondary: #49454F;
            --radius-xl: 28px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--surface); color: var(--text-main); line-height: 1.6; }
        h1, h2, h3 { font-family: 'Outfit', sans-serif; }
        header { background: linear-gradient(135deg, #6750A4 0%, #B69DF8 100%); padding: 60px 20px; text-align: center; color: white; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; }
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        .logo-placeholder { width: 70px; height: 70px; background: white; border-radius: 18px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 35px; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin: 40px 0; }
        .feature-card { background: white; padding: 25px; border-radius: var(--radius-xl); border: 1px solid var(--primary-container); }
        .feature-icon { font-size: 24px; color: var(--primary); margin-bottom: 10px; display: block; }
        footer { text-align: center; padding: 40px; color: var(--text-secondary); font-size: 0.9rem; }
        footer a { color: var(--primary); text-decoration: none; font-weight: 600; margin-top: 10px; display: inline-block; }
    </style>
</head>
<body>
    <header>
        <div class="logo-placeholder">📊</div>
        <h1>Novum Finanzas</h1>
        <p>Gestión financiera inteligente con privacidad garantizada.</p>
    </header>
    <div class="container">
        <section class="features">
            <div class="feature-card">
                <span class="feature-icon">☁️</span>
                <h3>Respaldos en la Nube</h3>
                <p>Usa Google Drive para mantener tus datos sincronizados de forma privada.</p>
            </div>
            <div class="feature-card">
                <span class="feature-icon">🤖</span>
                <h3>IA de Vanguardia</h3>
                <p>Automatización de gastos con Gemini 1.5 Flash.</p>
            </div>
        </section>
    </div>
    <footer>
        <p>&copy; 2026 Novum Finanzas</p>
        <a href="privacy.html">Política de Privacidad</a>
    </footer>
</body>
</html>
